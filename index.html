<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAVEN CTF - The Hidden Nest</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #30363d;
            border-radius: 15px;
            background: #161b22;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #f0f6fc;
            text-shadow: 2px 2px #238636;
        }

        p {
            color: #8b949e;
            font-size: 1.1rem;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        .hint {
            margin-top: 30px;
            font-style: italic;
            color: #f85149;
            cursor: default;
            user-select: none;
        }

        /* Dekorasi sederhana */
        .box {
            width: 50px;
            height: 50px;
            border: 1px solid #30363d;
            margin: 20px auto;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch">
            <!-- RAVEN{1nsp3ct_3l3m3nt_1s_y0ur_fr13nd} -->
        </div>
        <p>Flag tidak ada di sini, atau benarkah?</p>
        <div class="box"></div>
        <p class="hint">// Sesuatu tersembunyi di dalam struktur...</p>
    </div>

    </body>
</html>
